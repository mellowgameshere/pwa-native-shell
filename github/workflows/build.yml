name: Android Build
on:
  workflow_dispatch:
    inputs:
      appName: { description: 'App Name', required: true }
      packageName: { description: 'Package Name', required: true }
      webUrl: { description: 'Web App URL', required: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with: { java-version: '17', distribution: 'temurin' }
      - name: Inject Config
        run: |
          sed -i "s/applicationId \".*\"/applicationId \"${{ github.event.inputs.packageName }}\"/" app/build.gradle
          sed -i "s/APP_NAME_PLACEHOLDER/${{ github.event.inputs.appName }}/" app/src/main/res/values/strings.xml
          sed -i "s|WEB_URL_PLACEHOLDER|${{ github.event.inputs.webUrl }}|" app/src/main/java/com/example/myapp/MainActivity.java
      - name: Build APK
        run: ./gradlew assembleRelease
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with: { name: 'release-apk', path: 'app/build/outputs/apk/release/app-release.apk' }
